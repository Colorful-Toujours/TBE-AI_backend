services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: tbe
      POSTGRES_PASSWORD: tbe_dev
      POSTGRES_DB: tbe_ledger
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
